name: Build release asset

on:
  release:
    types: [published]

env:
  DECKY_CLI_VERSION: "0.0.8"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm i
      - uses: docker/setup-buildx-action@v3
      - name: Install Decky CLI
        run: |
          curl -fL -o decky "https://github.com/SteamDeckHomebrew/cli/releases/download/${DECKY_CLI_VERSION}/decky-linux-x86_64"
          chmod +x decky
          sudo mv decky /usr/local/bin/decky
      - run: decky plugin build
      - name: Upload release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" out/*.zip --repo "${{ github.repository }}"
